<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#faf4ef" />
    <script>
      // Apply the saved theme before first paint so dark mode never flashes light.
      (function () {
        try {
          var raw = localStorage.getItem('lf:theme')
          var mode = raw ? JSON.parse(raw) : 'system'
          var dark =
            mode === 'dark' ||
            (mode === 'system' && matchMedia('(prefers-color-scheme: dark)').matches)
          if (dark) {
            document.documentElement.setAttribute('data-theme', 'dark')
            var m = document.querySelector('meta[name="theme-color"]')
            if (m) m.setAttribute('content', '#17131c')
          }
        } catch (e) {}
      })()
    </script>
    <meta
      name="description"
      content="Ghid low-FODMAP în română: alimente permise și interzise cu sistem semafor și porții sigure, rețete filtrabile și constructor de rețete proprii."
    />
    <title>Poftă — ghid low-FODMAP</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
